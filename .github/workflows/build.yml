name: Continuous hdtSMP64 Windows Build

on:
  push:
    branches:
      - testbuild
      #- main
      #- test
  pull_request:
    branches:
      - testbuild
      #- main
      #- test

jobs:
  build:
    runs-on: windows-2022
    strategy:
      # Use a matrix to run both presets at the same time
      matrix:
        preset: [vs2022-windows-nocuda-avx2, vs2022-windows-nocuda-avx512]

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # This handles your 'git submodule update --init --recursive' automatically
          submodules: recursive

      # 2. Cache vcpkg dependencies to save time
      - name: Restore vcpkg and binary cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}
            ~/.cache/vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ matrix.preset }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # 3. Configuration CMake avec injection du toolchain vcpkg
      - name: Configure CMake
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_MANIFEST_MODE=ON
          -DCompiledPluginsPath="${{ github.workspace }}/build/plugins"
        shell: pwsh

      # 4: Create the CompiledPluginsPath folder structure
      - name: Create the CompiledPluginsPath folder structure
        run: mkdir -p "${{ github.workspace }}/build/plugins/SKSE/Plugins/"
        shell: bash

      # 5. Build the project
      - name: Build
        run: cmake --build build --config Release

      # 6. Create the ZIP file immediately after building
      - name: Archive Binaries
        shell: bash
        run: |
          cd build/plugins
          tar -a -c -f ../../${{ matrix.preset }}.zip *

      # 7. Save the resulting binaries so you can download them
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: ${{ matrix.preset }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Update 'Latest' Release
        uses: softprops/action-gh-release@v2
        with:
          # This creates/updates a release named "Latest Continuous Build"
          tag_name: latest
          name: Latest Continuous Build
          body: |
            Automated build from the latest push.
            Build Date: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
          files: |
            vs2022-windows-nocuda-avx2/*.zip
            vs2022-windows-nocuda-avx512/*.zip
          # 'prerelease: true' flags it so users know it's an automated build
          prerelease: true